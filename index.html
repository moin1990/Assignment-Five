<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
        <!--Login Page-->
    <div id="login-page">
    
        <div class="login-card">
            <div class="login-logo">
                <img src="./image/github-logo.png" alt="">
                <h2>GitHub Issues Tracker</h2>
                <p>Sign in to manage your issues</p>
            </div>
          
            <div class="field-group">
                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Enter Username"/>
                <div class="field-hint">Default: admin</div>
                <div class="error-msg" id="err-user">Please enter your username</div>
            </div>
          
            <div class="field-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter Password"/>
                <div class="field-hint">Default: admin123</div>
                <div class="error-msg" id="err-pass">Please enter your password</div>
            </div>
          
            <div class="error-msg" id="err-creds" style="margin-bottom:8px;font: size 14px;">
                Invalid credentials. Use admin / admin123
            </div>
          
            <button id="btn-signin" onclick="handleLogin()">Sign In</button>
        
            
            <div class="divider">
                <span class="divider-line"></span>
                OR
                <span class="divider-line"></span>
            </div>
          
            <div class="demo-box">
                <p>Demo Credentials:</p>
                <div class="demo-credits">
                  <span>Username:</span> admin<br>
                  <span>Password:</span> admin123
                </div>
            </div>
        </div>
    </div>
        
</body>
</html>
